name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test contracts
        run: cargo test --workspace

  frontend:
    runs-on: ubuntu-latest
    env:
      VITE_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
      VITE_STELLAR_NETWORK: testnet
      VITE_PAYMENT_TRACKER_CONTRACT_ID: CBNNUFSTMHM6FHDBPAC4J3IRAO4TLYDCDFWKCYGGOWG76LY5QNXXKESB
      VITE_PAYMENT_STATS_CONTRACT_ID: CBCSQQXQF4LDFXFZ7MRLPYHVOJGLYVVVOLUCNWF42AXQ4YCAJ4LBJQRM
      VITE_PAYMENT_TOKEN_CONTRACT_ID: CBNNUFSTMHM6FHDBPAC4J3IRAO4TLYDCDFWKCYGGOWG76LY5QNXXKESB
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --workspace frontend

      - name: Test frontend
        run: npm test --workspace frontend -- --run

      - name: Build frontend
        run: npm run build --workspace frontend
